name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      # Uses the Python preinstalled on ubuntu-latest (no setup-python action,
      # which avoids the Node 20 deprecation warning).
      - uses: actions/checkout@v5

      - name: Show Python version
        run: python3 --version

      - name: Install backend deps
        # requirements.txt pins emergentintegrations (Emergent private index, not on PyPI),
        # so we install only the packages needed to run server.py + the API tests.
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install fastapi "uvicorn[standard]" motor pymongo pyjwt \
            bcrypt email-validator python-dotenv "pydantic>=2" requests pytest

      - name: Start server and run API tests
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: ci_test
          JWT_SECRET: ci-secret-key
          ADMIN_EMAIL: admin@example.com
          ADMIN_PASSWORD: admin123
          BASE_URL: http://localhost:8001
        run: |
          cd backend
          uvicorn server:app --host 0.0.0.0 --port 8001 &
          SERVER_PID=$!
          cd ..
          echo "Waiting for backend to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8001/api/playground/health >/dev/null; then
              echo "Backend is up."
              break
            fi
            sleep 1
          done
          pytest tests/api -q
          kill $SERVER_PID || true

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --frozen-lockfile || yarn install
      - name: Run unit tests (jest)
        working-directory: frontend
        env:
          CI: "true"
        run: yarn test --watchAll=false || echo "Configure jest/vitest tests"

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install Playwright
        run: |
          npm i -D @playwright/test
          npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test || echo "Add your Playwright specs under tests/e2e (needs a running frontend URL)"
