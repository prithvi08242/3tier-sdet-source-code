name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: |
          pip install -r backend/requirements.txt
      - name: Run API tests (pytest)
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: ci_test
          JWT_SECRET: ci-secret-key
        run: |
          pytest tests/api -q || echo "Add your pytest suite under tests/api"

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --frozen-lockfile || yarn install
      - name: Run unit tests (jest/vitest)
        working-directory: frontend
        run: yarn test --watchAll=false || echo "Configure jest/vitest tests"

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Playwright
        run: |
          npm i -D @playwright/test
          npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test || echo "Add your Playwright specs under tests/e2e"
